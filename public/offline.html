<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a1a" />
  <title>Offline · American Pub Poker</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <style>
    :root { color-scheme: dark; }
    html, body { margin: 0; padding: 0; height: 100%; background: #0a0a1a; color: #E5E7EB;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
    .wrap { min-height: 100%; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card {
      max-width: 440px; text-align: center; padding: 28px 24px;
      background: linear-gradient(180deg, #1F2937, #0B0F19);
      border: 1px solid rgba(255, 215, 0, 0.35); border-radius: 14px;
      box-shadow: 0 10px 28px rgba(0,0,0,0.6), 0 0 24px rgba(255,215,0,0.12);
    }
    h1 { font-size: 1.3rem; margin: 0 0 8px; color: #FFD700; letter-spacing: 0.02em; }
    p { margin: 8px 0; line-height: 1.45; color: #cbd5e1; }
    button {
      margin-top: 16px; padding: 10px 18px; cursor: pointer;
      background: rgba(34,211,238,0.18); color: #E5E7EB; font-weight: 600;
      border: 1px solid rgba(34,211,238,0.55); border-radius: 8px;
    }
    button:hover { background: rgba(34,211,238,0.28); }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>You're offline</h1>
      <p>American Pub Poker needs a network connection to reach the live table.</p>
      <p>Check your connection and try again.</p>
      <button onclick="location.reload()">Retry</button>
    </div>
  </div>
</body>
</html>
