name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      # Lint is non-blocking until the pre-existing eslint debt is cleaned
      # (unused vars in App.jsx + service-worker globals not declared in
      # eslint.config.js). Flip continue-on-error to false once the errors
      # are fixed so CI gates on clean lint.
      - name: Lint (non-blocking — pre-existing debt)
        continue-on-error: true
        run: npm run lint

      - name: Build (desktop)
        run: npm run build

      - name: Build (mobile)
        run: npm run build:mobile
